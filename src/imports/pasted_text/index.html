<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobo Khat — Product Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  font-family: 'Inter', sans-serif;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══ LAYOUT ═══ */
.container { width: 100%; margin: 0; padding: 0 50px; }
@media (min-width: 1024px) { .container { padding: 0 50px; } }

.hero { position: relative; min-height: 100vh; overflow: visible; }
.hero-inner { position: relative; padding-top: 6vh; overflow: visible; }
.hero-content { position: relative; overflow: visible; width: 100%; }

/* ═══ FLOATING PILL ═══ */
.pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 9999px;
  padding: 8px 22px;
  border: 1.5px solid rgba(213,255,115,0.4);
  background: transparent;
  font-size: 16px;
  font-weight: 400;
  color: #D5FF73;
  pointer-events: none;
  opacity: 0;
  transform: scale(0.8);
}
.pill-intro { animation: pillIn 0.5s ease forwards 0.6s; }
.pill-bio { animation: pillIn 0.5s ease forwards 1.8s; }
@keyframes pillIn { to { opacity: 1; transform: scale(1); } }

/* ═══ HEADING ═══ */
.heading {
  position: relative;
  z-index: 10;
  max-width: 620px;
  font-size: clamp(42px, 5.5vw, 76px);
  font-weight: 300;
  line-height: 1.02;
  letter-spacing: -0.035em;
  color: white;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.9s ease forwards 0.1s;
}
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

/* ═══ DESIGN GRID ═══ */
.grid-wrapper {
  position: absolute;
  inset: 0;
  top: -6vh;
  bottom: -40vh;
  left: -120px;
  right: -80px;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards 0.3s;
  -webkit-mask-image: radial-gradient(ellipse 80% 90% at 50% 45%, black 45%, transparent 100%);
  mask-image: radial-gradient(ellipse 80% 90% at 50% 45%, black 45%, transparent 100%);
}
@media (max-width: 799px) { .grid-wrapper { display: none; } }
@media (max-width: 799px) { .shape, .cursor { display: none; } }
@keyframes fadeIn { to { opacity: 1; } }

.grid-svg { position: absolute; inset: 0; width: 100%; height: 100%; }

/* Grid line draw-in */
.grid-line {
  stroke-dasharray: 1200;
  stroke-dashoffset: 1200;
}
.grid-line-v { animation: drawLine 1.2s ease forwards; }
.grid-line-h { animation: drawLine 1.2s ease forwards; }
@keyframes drawLine { to { stroke-dashoffset: 0; } }

/* Concentric circle scale-in */
.concentric {
  transform-origin: center;
  transform: scale(0);
  transform-box: fill-box;
}
.concentric-0 { animation: scaleIn 0.8s ease forwards 0.5s; }
.concentric-1 { animation: scaleIn 0.8s ease forwards 0.65s; }
.concentric-2 { animation: scaleIn 0.8s ease forwards 0.8s; }
.concentric-3 { animation: scaleIn 0.8s ease forwards 0.95s; }

.concentric-s-0 { animation: scaleIn 0.6s ease forwards 1.0s; }
.concentric-s-1 { animation: scaleIn 0.6s ease forwards 1.1s; }
.concentric-s-2 { animation: scaleIn 0.6s ease forwards 1.2s; }
@keyframes scaleIn { to { transform: scale(1); } }

/* Ripple animation */
.ripple {
  transform-origin: center;
  transform-box: fill-box;
  animation: rippleExpand 4s ease-out infinite;
}
.ripple-1 { animation-delay: 1s; }
.ripple-2 { animation-delay: 2.33s; }
.ripple-3 { animation-delay: 3.66s; }
@keyframes rippleExpand {
  0% { r: 30; opacity: 0.35; stroke-width: 1.2; }
  100% { r: 180; opacity: 0; stroke-width: 0.3; }
}

/* Center dot pulse */
.center-dot {
  transform-origin: center;
  transform-box: fill-box;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.5); opacity: 0.9; }
}
.inner-glow {
  transform-origin: center;
  transform-box: fill-box;
  animation: pulseGlow 2s ease-in-out infinite 0.3s;
}
@keyframes pulseGlow {
  0%, 100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.3); opacity: 0.5; }
}

/* Wireframe rect resize animation */
@keyframes wireframeResize {
  0%, 100% { width: 24px; height: 24px; }
  25% { width: 30px; height: 18px; }
  50% { width: 20px; height: 28px; }
  75% { width: 28px; height: 22px; }
}
@keyframes wireframeHandleR {
  0%, 100% { translate: 0 0; }
  25% { translate: 6px 0; }
  50% { translate: -4px 0; }
  75% { translate: 4px 0; }
}
@keyframes wireframeHandleB {
  0%, 100% { translate: 0 0; }
  25% { translate: 0 -6px; }
  50% { translate: 0 4px; }
  75% { translate: 0 -2px; }
}
@keyframes wireframeHandleBR {
  0%, 100% { translate: 0 0; }
  25% { translate: 6px -6px; }
  50% { translate: -4px 4px; }
  75% { translate: 4px -2px; }
}

/* ═══ SHAPES ═══ */
.shape {
  position: absolute;
  pointer-events: none;
  z-index: 10;
  opacity: 0;
  transform: scale(0);
}
@keyframes shapeIn {
  0% { opacity: 0; transform: scale(0); }
  60% { transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}

/* ═══ CURSORS ═══ */
.cursor {
  position: absolute;
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transform: scale(0.3);
}
@keyframes cursorIn { to { opacity: 1; transform: scale(1); } }

.cursor-visual {
  left: 80%; top: 140px;
  animation: cursorIn 0.5s ease forwards 0.9s, driftVisual 8s ease-in-out infinite 0.9s;
}
.cursor-designer {
  left: 85%; top: 280px;
  animation: cursorIn 0.5s ease forwards 1.2s, driftDesigner 9s ease-in-out infinite 1.2s;
}
.cursor-interaction {
  left: 54%; top: 220px;
  animation: cursorIn 0.5s ease forwards 1.5s, driftInteraction 7s ease-in-out infinite 1.5s;
}

@keyframes driftVisual {
  0%, 100% { translate: 0 0; }
  20% { translate: -12px 8px; }
  40% { translate: 8px -10px; }
  60% { translate: -5px 5px; }
  80% { translate: 10px -7px; }
}
@keyframes driftDesigner {
  0%, 100% { translate: 0 0; }
  20% { translate: 14px -10px; }
  40% { translate: -10px 14px; }
  60% { translate: 12px -8px; }
  80% { translate: -6px 11px; }
}
@keyframes driftInteraction {
  0%, 100% { translate: 0 0; }
  20% { translate: -8px 5px; }
  40% { translate: 10px -9px; }
  60% { translate: -6px 7px; }
  80% { translate: 9px -5px; }
}

.cursor-label {
  position: absolute;
  padding: 6px 14px;
  border-radius: 9999px;
  white-space: nowrap;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  top: 36px;
}
.cursor-label-left { left: 6px; }
.cursor-label-right { right: 6px; }

/* ═══ BIO SECTION ═══ */
.bio-section { margin-top: 80px; padding-bottom: 4vh; }
.bio-section { position: relative; }
.bio-bar {
  display: inline-block;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 9999px;
  padding: 14px 32px;
  font-size: 14px;
  color: white;
  letter-spacing: 0.01em;
  background: rgba(255,255,255,0.02);
  opacity: 0;
  transform: translateY(15px);
  animation: fadeUp 0.8s ease forwards 1.2s;
}

/* ═══ MOBILE CANVAS — grid + cursors + shapes for <800px ═══ */
.mobile-canvas {
  display: none;
  position: relative;
  width: 100%;
  height: 70px;
  margin-top: 0px;
  overflow: visible;
}
.mobile-full-grid {
  display: none;
  position: absolute;
  top: -30px;
  bottom: -80px;
  left: -24px;
  right: -24px;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards 0.3s;
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 3%, black 10%, black 65%, rgba(0,0,0,0.3) 82%, transparent 95%);
  mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 3%, black 10%, black 65%, rgba(0,0,0,0.3) 82%, transparent 95%);
}
.mobile-canvas .mobile-grid-wrapper {
  display: none;
}
.mobile-shape {
  position: absolute;
  pointer-events: none;
  z-index: 10;
  opacity: 0;
  transform: scale(0);
}
.mobile-cursor {
  position: absolute;
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transform: scale(0.3);
}
.mobile-cursor-label {
  position: absolute;
  padding: 5px 12px;
  border-radius: 9999px;
  white-space: nowrap;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  top: 32px;
}
.mobile-cursor-label-left { left: 6px; }
.mobile-cursor-label-right { right: 6px; }

.mc-visual {
  left: 52%; top: 10px;
  animation: cursorIn 0.5s ease forwards 0.9s, driftMobileVisual 8s ease-in-out infinite 0.9s;
}
.mc-designer {
  left: 82%; top: 34px;
  animation: cursorIn 0.5s ease forwards 1.2s, driftMobileDesigner 9s ease-in-out infinite 1.2s;
}
.mc-interaction {
  left: 12%; top: 15px;
  animation: cursorIn 0.5s ease forwards 1.5s, driftMobileInteraction 7s ease-in-out infinite 1.5s;
}

@keyframes driftMobileVisual {
  0%, 100% { translate: 0 0; }
  20% { translate: -6px 4px; }
  40% { translate: 4px -5px; }
  60% { translate: -3px 3px; }
  80% { translate: 5px -4px; }
}
@keyframes driftMobileDesigner {
  0%, 100% { translate: 0 0; }
  20% { translate: 7px -5px; }
  40% { translate: -5px 7px; }
  60% { translate: 6px -4px; }
  80% { translate: -3px 6px; }
}
@keyframes driftMobileInteraction {
  0%, 100% { translate: 0 0; }
  20% { translate: -4px 3px; }
  40% { translate: 5px -5px; }
  60% { translate: -3px 4px; }
  80% { translate: 4px -3px; }
}

/* ═══ MOBILE (<800px) ═══ */
@media (max-width: 799px) {
  .container { padding: 0 24px; }
  .hero-content { display: flex; flex-direction: column; align-items: center; }
  .heading { text-align: center; font-size: clamp(36px, 10vw, 52px); }
  .bio-section { display: flex; flex-direction: column; align-items: center; }
  .bio-section .container { display: flex; flex-direction: column; align-items: center; }
  .bio-bar { text-align: center; padding: 12px 24px; font-size: 13px; border-radius: 16px; }
  .bio-section { margin-top: 24px; display: flex; flex-direction: column; align-items: center; }
  .mobile-canvas { display: block; }
  .mobile-full-grid { display: block; }
  .mobile-heading-visual { display: block !important; }
  .hero { min-height: auto; }
  .bio-section { padding-bottom: 3vh; }
}
</style>
</head>
<body>

<!-- ═══ HERO ═══ -->
<section class="hero">
  <!-- Mobile full-height grid background -->
  <div class="mobile-full-grid">
    <svg class="grid-svg" viewBox="0 0 1100 600" preserveAspectRatio="xMidYMid slice">
      <defs id="mobileGridDefs"></defs>
      <g id="mobileGridLines"></g>
      <circle class="concentric concentric-0" cx="480" cy="270" r="50" fill="none" stroke="#8B5CF6" stroke-width="1.2" opacity="0.35"/>
      <circle class="concentric concentric-1" cx="480" cy="270" r="80" fill="none" stroke="#8B5CF6" stroke-width="0.7" opacity="0.35"/>
      <circle class="concentric concentric-2" cx="480" cy="270" r="115" fill="none" stroke="#8B5CF6" stroke-width="0.7" opacity="0.14"/>
      <circle class="concentric concentric-3" cx="480" cy="270" r="160" fill="none" stroke="#8B5CF6" stroke-width="0.7" opacity="0.14"/>
      <circle class="ripple ripple-1" cx="480" cy="270" r="30" fill="none" stroke="#8B5CF6" stroke-width="1"/>
      <circle class="ripple ripple-2" cx="480" cy="270" r="30" fill="none" stroke="#8B5CF6" stroke-width="1"/>
      <circle class="ripple ripple-3" cx="480" cy="270" r="30" fill="none" stroke="#8B5CF6" stroke-width="1"/>
      <circle class="center-dot" cx="480" cy="270" r="4" fill="#8B5CF6"/>
      <circle class="inner-glow" cx="480" cy="270" r="8" fill="none" stroke="#8B5CF6" stroke-width="0.8"/>
    </svg>
  </div>

  <div class="hero-inner">
    <div class="container">
      <div class="hero-content">

        <!-- Intro pill -->
        <div style="margin-bottom:15px">
          <div class="pill pill-intro">Intro</div>
        </div>

        <!-- Visual cursor + color-swatches — top-right, aligned with Intro (mobile only) -->
        <div class="mobile-heading-visual" style="display:none;position:absolute;right:0;top:6vh">
          <div class="mobile-shape" style="right:0px;top:-10px;left:auto;animation:shapeIn 0.6s ease forwards 0.7s">
            <svg width="45" height="50" viewBox="0 0 80 88" fill="none">
              <rect x="8" y="4" width="32" height="24" rx="4" fill="#8B5CF620" stroke="#8B5CF650" stroke-width="1"/>
              <rect x="20" y="14" width="32" height="24" rx="4" fill="#EC489920" stroke="#EC489950" stroke-width="1"/>
              <rect x="32" y="24" width="32" height="24" rx="4" fill="#F0AD3E20" stroke="#F0AD3E50" stroke-width="1"/>
              <circle cx="52" cy="60" r="4" fill="#EC489940" stroke="#EC489960" stroke-width="0.8"/>
              <circle cx="62" cy="60" r="4" fill="#8B5CF640" stroke="#8B5CF660" stroke-width="0.8"/>
              <circle cx="72" cy="60" r="4" fill="#0061FF40" stroke="#0061FF60" stroke-width="0.8"/>
            </svg>
          </div>
          <div class="mobile-cursor" style="right:-10px;top:35px;left:auto;animation:cursorIn 0.5s ease forwards 0.9s, driftMobileVisual 8s ease-in-out infinite 0.9s">
            <div style="transform:scale(0.85)">
              <svg width="22" height="32" viewBox="0 0 24 36" fill="none">
                <path d="M22 2L22 28L15.5 21L9 32L4.5 29.5L11 19L3 18L22 2Z" fill="#EC4899" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
              </svg>
              <div class="mobile-cursor-label mobile-cursor-label-right" style="background:#EC4899;box-shadow:0 4px 16px #EC489950">Visual</div>
            </div>
          </div>
        </div>

        <!-- Heading -->
        <h1 class="heading">
          Bobo Khat<br>is a<br>product designer
        </h1>

        <!-- ═══ SVG GRID ═══ -->
        <div class="grid-wrapper">
          <svg class="grid-svg" viewBox="0 0 1100 600" preserveAspectRatio="xMidYMid slice">
            <defs id="gridDefs">
              <!-- Per-line gradients generated by JS -->
            </defs>

            <!-- Grid lines — each line fades independently -->
            <g id="gridLines"></g>

            <!-- Concentric circles (center at 605, 270) -->
            <circle class="concentric concentric-0" cx="605" cy="270" r="50" fill="none" stroke="#8B5CF6" stroke-width="1.2" opacity="0.35"/>
            <circle class="concentric concentric-1" cx="605" cy="270" r="80" fill="none" stroke="#8B5CF6" stroke-width="0.7" opacity="0.35"/>
            <circle class="concentric concentric-2" cx="605" cy="270" r="115" fill="none" stroke="#8B5CF6" stroke-width="0.7" opacity="0.14"/>
            <circle class="concentric concentric-3" cx="605" cy="270" r="160" fill="none" stroke="#8B5CF6" stroke-width="0.7" opacity="0.14"/>

            <!-- Ripple rings -->
            <circle class="ripple ripple-1" cx="605" cy="270" r="30" fill="none" stroke="#8B5CF6" stroke-width="1"/>
            <circle class="ripple ripple-2" cx="605" cy="270" r="30" fill="none" stroke="#8B5CF6" stroke-width="1"/>
            <circle class="ripple ripple-3" cx="605" cy="270" r="30" fill="none" stroke="#8B5CF6" stroke-width="1"/>

            <!-- Center dot -->
            <circle class="center-dot" cx="605" cy="270" r="4" fill="#8B5CF6"/>
            <circle class="inner-glow" cx="605" cy="270" r="8" fill="none" stroke="#8B5CF6" stroke-width="0.8"/>

            <!-- Secondary cluster (lower right) -->
            <circle class="concentric concentric-s-0" cx="858" cy="408" r="30" fill="none" stroke="rgba(139,92,246,0.15)" stroke-width="0.6" opacity="0.15"/>
            <circle class="concentric concentric-s-1" cx="858" cy="408" r="50" fill="none" stroke="rgba(139,92,246,0.15)" stroke-width="0.6" opacity="0.15"/>
            <circle class="concentric concentric-s-2" cx="858" cy="408" r="75" fill="none" stroke="rgba(139,92,246,0.15)" stroke-width="0.6" opacity="0.15"/>
          </svg>
        </div>

        <!-- ═══ SHAPES ═══ -->

        <!-- Color swatches (for Visual cursor) -->
        <div class="shape" style="left:82%;top:70px;animation:shapeIn 0.6s ease forwards 0.7s">
          <svg width="90" height="99" viewBox="0 0 80 88" fill="none">
            <rect x="8" y="4" width="32" height="24" rx="4" fill="#8B5CF620" stroke="#8B5CF650" stroke-width="1"/>
            <rect x="20" y="14" width="32" height="24" rx="4" fill="#EC489920" stroke="#EC489950" stroke-width="1"/>
            <rect x="32" y="24" width="32" height="24" rx="4" fill="#F0AD3E20" stroke="#F0AD3E50" stroke-width="1"/>
            <g transform="translate(10,54)">
              <line x1="2" y1="22" x2="12" y2="12" stroke="#EC489950" stroke-width="1.2" stroke-linecap="round"/>
              <rect x="10" y="4" width="6" height="14" rx="3" fill="none" stroke="#EC489950" stroke-width="1" transform="rotate(45 13 11)"/>
              <circle cx="3" cy="21" r="2" fill="#EC489935" stroke="#EC489950" stroke-width="0.8"/>
            </g>
            <circle cx="52" cy="60" r="4" fill="#EC489940" stroke="#EC489960" stroke-width="0.8"/>
            <circle cx="62" cy="60" r="4" fill="#8B5CF640" stroke="#8B5CF660" stroke-width="0.8"/>
            <circle cx="72" cy="60" r="4" fill="#0061FF40" stroke="#0061FF60" stroke-width="0.8"/>
            <circle cx="52" cy="72" r="4" fill="#F0AD3E40" stroke="#F0AD3E60" stroke-width="0.8"/>
            <circle cx="62" cy="72" r="4" fill="#10B98140" stroke="#10B98160" stroke-width="0.8"/>
            <circle cx="72" cy="72" r="4" fill="#ffffff20" stroke="#ffffff40" stroke-width="0.8"/>
            <rect x="31" y="23" width="34" height="26" rx="5" fill="none" stroke="#EC489940" stroke-width="1.2" stroke-dasharray="4 3"/>
            <rect x="29" y="21" width="4" height="4" rx="0.5" fill="#EC489950"/>
            <rect x="63" y="21" width="4" height="4" rx="0.5" fill="#EC489950"/>
            <rect x="29" y="47" width="4" height="4" rx="0.5" fill="#EC489950"/>
            <rect x="63" y="47" width="4" height="4" rx="0.5" fill="#EC489950"/>
          </svg>
        </div>

        <!-- Wireframe vector (for Designer cursor) -->
        <div class="shape" style="left:81%;top:245px;animation:shapeIn 0.6s ease forwards 1.0s">
          <svg width="90" height="90" viewBox="0 0 90 90" fill="none">
            <path d="M12 72 C12 72, 20 20, 45 35 S70 10, 78 18" stroke="#F0AD3E70" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <line x1="12" y1="72" x2="20" y2="20" stroke="#F0AD3E30" stroke-width="0.7" stroke-dasharray="3 2"/>
            <line x1="45" y1="35" x2="70" y2="10" stroke="#F0AD3E30" stroke-width="0.7" stroke-dasharray="3 2"/>
            <rect x="9" y="69" width="6" height="6" rx="0.5" fill="#F0AD3E90" stroke="#F0AD3E" stroke-width="1"/>
            <rect x="42" y="32" width="6" height="6" rx="0.5" fill="#F0AD3E90" stroke="#F0AD3E" stroke-width="1"/>
            <rect x="75" y="15" width="6" height="6" rx="0.5" fill="#F0AD3E90" stroke="#F0AD3E" stroke-width="1"/>
            <circle cx="20" cy="20" r="3" fill="none" stroke="#F0AD3E50" stroke-width="0.8"/>
            <circle cx="20" cy="20" r="1.2" fill="#F0AD3E60"/>
            <circle cx="70" cy="10" r="3" fill="none" stroke="#F0AD3E50" stroke-width="0.8"/>
            <circle cx="70" cy="10" r="1.2" fill="#F0AD3E60"/>
            <rect x="55" y="52" rx="4" fill="#F0AD3E08" stroke="#F0AD3E35" stroke-width="1" stroke-dasharray="4 3" style="width:24px;height:24px;animation:wireframeResize 8s ease-in-out 2s infinite"/>
            <rect x="53" y="50" width="4" height="4" rx="0.5" fill="#F0AD3E50"/>
            <rect x="77" y="50" width="4" height="4" rx="0.5" fill="#F0AD3E50" style="animation:wireframeHandleR 8s ease-in-out 2s infinite"/>
            <rect x="53" y="74" width="4" height="4" rx="0.5" fill="#F0AD3E50" style="animation:wireframeHandleB 8s ease-in-out 2s infinite"/>
            <rect x="77" y="74" width="4" height="4" rx="0.5" fill="#F0AD3E50" style="animation:wireframeHandleBR 8s ease-in-out 2s infinite"/>
          </svg>
        </div>

        <!-- Ambient shapes -->
        <div class="shape" style="left:66%;top:60px;animation:shapeIn 0.6s ease forwards 1.1s">
          <svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="#0061FF45" stroke-width="1.5"/><circle cx="16" cy="16" r="9" fill="none" stroke="#0061FF30" stroke-width="1"/></svg>
        </div>
        <div class="shape" style="left:68%;top:380px;animation:shapeIn 0.6s ease forwards 1.4s">

<script>
// Generate grid lines with per-line fade gradients
(function() {
  const ns = 'http://www.w3.org/2000/svg';
  const gridW = 1100, gridH = 600, cols = 18, rows = 10;
  const cellW = gridW / cols, cellH = gridH / rows;

  const vFades = [
    [2,10,82,96], [5,30,62,92], [1,12,80,97], [8,40,52,88],
    [3,22,68,93], [0,8,85,98], [6,35,58,90], [2,16,75,95],
    [10,45,50,85], [4,18,72,94]
  ];
  const hFades = [
    [3,8,88,96], [6,20,72,92], [2,10,82,97], [8,28,64,90],
    [4,14,78,94], [1,6,90,98], [5,22,70,93], [10,32,60,88],
    [3,12,84,95], [7,18,74,91], [12,38,55,86]
  ];

  const vOpacities = [0.05, 0.14, 0.07, 0.19, 0.04, 0.22, 0.09, 0.16, 0.06, 0.25, 0.08, 0.18, 0.03, 0.12, 0.21, 0.06, 0.15, 0.10, 0.07];
  const vWeights =   [0.3,  0.7,  0.4,  0.9,  0.35, 1.0,  0.5,  0.75, 0.3,  1.1,  0.45, 0.85, 0.25, 0.6,  0.95, 0.35, 0.8,  0.5,  0.4];
  const hOpacities = [0.12, 0.24, 0.08, 0.20, 0.14, 0.28, 0.10, 0.22, 0.06, 0.18, 0.13];
  const hWeights =   [0.5,  0.9,  0.35, 0.8,  0.6,  1.1,  0.4,  0.85, 0.3,  0.7,  0.55];

  function pick(i, variants) {
    return variants[((i * 7 + 3) * 13) % variants.length];
  }

  // Multi-stop fade variants for lines that disappear mid-way then reappear
  var vMultiStops = [
    [[0,0],[6,1],[28,1],[35,0],[58,0],[65,1],[88,1],[97,0]],
    [[0,0],[10,1],[42,1],[48,0.15],[54,0.15],[60,1],[82,1],[95,0]],
    [[0,0],[4,1],[20,1],[26,0],[44,0],[50,0.8],[70,0.8],[76,0],[90,0],[96,1],[100,0]],
    [[0,0],[8,0.6],[18,1],[38,1],[44,0],[62,0],[68,1],[92,1],[100,0]],
    [[0,0],[12,1],[50,1],[56,0.1],[62,1],[85,1],[94,0]],
    [[0,0],[3,0.7],[15,1],[30,1],[36,0],[40,0],[46,0.5],[52,1],[78,1],[90,0]]
  ];
  var hMultiStops = [
    [[0,0],[5,1],[32,1],[38,0],[55,0],[62,1],[90,1],[98,0]],
    [[0,0],[8,0.8],[22,1],[44,1],[50,0.1],[56,1],[75,1],[92,0]],
    [[0,0],[3,1],[18,1],[24,0],[38,0],[44,0.6],[58,1],[72,1],[78,0],[88,0],[94,1],[100,0]],
    [[0,0],[10,1],[35,1],[42,0.2],[48,0.2],[55,1],[82,1],[96,0]],
    [[0,0],[6,1],[25,1],[30,0],[48,0],[54,1],[70,1],[76,0],[86,0],[92,0.7],[100,0]]
  ];

  function pickMultiStop(i, variants) {
    var hash = ((i * 11 + 5) * 17) % 7;
    if (hash < 3) return null;
    return variants[((i * 13 + 7) * 11) % variants.length];
  }

  // Build grid lines into a target (desktop + mobile)
  function buildGrid(defsEl, gEl, prefix, opacityBoost, strokeBoost) {
    opacityBoost = opacityBoost || 1;
    strokeBoost = strokeBoost || 1;
    for (let i = 0; i <= cols; i++) {
      const gradId = prefix + 'V' + i;
      const grad = document.createElementNS(ns, 'linearGradient');
      grad.setAttribute('id', gradId);
      grad.setAttribute('x1', '0'); grad.setAttribute('y1', '0');
      grad.setAttribute('x2', '0'); grad.setAttribute('y2', gridH);
      grad.setAttribute('gradientUnits', 'userSpaceOnUse');

      var multi = pickMultiStop(i, vMultiStops);
      if (multi) {
        multi.forEach(function(pair) {
          const s = document.createElementNS(ns, 'stop');
          s.setAttribute('offset', pair[0] + '%');
          s.setAttribute('stop-color', 'white');
          s.setAttribute('stop-opacity', pair[1]);
          grad.appendChild(s);
        });
      } else {
        const [a, b, c, d] = pick(i, vFades);
        [[a,0],[b,1],[c,1],[d,0]].forEach(([off, op]) => {
          const s = document.createElementNS(ns, 'stop');
          s.setAttribute('offset', off + '%');
          s.setAttribute('stop-color', 'white');
          s.setAttribute('stop-opacity', op);
          grad.appendChild(s);
        });
      }
      defsEl.appendChild(grad);

      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', i * cellW); line.setAttribute('y1', 0);
      line.setAttribute('x2', i * cellW); line.setAttribute('y2', gridH);
      line.setAttribute('stroke', 'url(#' + gradId + ')');
      line.setAttribute('stroke-width', (vWeights[i] || 0.4) * strokeBoost);
      line.setAttribute('opacity', Math.min((vOpacities[i] || 0.08) * opacityBoost, 1));
      line.classList.add('grid-line', 'grid-line-v');
      line.style.animationDelay = (0.06 * i) + 's';
      gEl.appendChild(line);
    }
    for (let i = 0; i <= rows; i++) {
      const gradId = prefix + 'H' + i;
      const grad = document.createElementNS(ns, 'linearGradient');
      grad.setAttribute('id', gradId);
      grad.setAttribute('x1', '0'); grad.setAttribute('y1', '0');
      grad.setAttribute('x2', gridW); grad.setAttribute('y2', '0');
      grad.setAttribute('gradientUnits', 'userSpaceOnUse');

      var multi = pickMultiStop(i, hMultiStops);
      if (multi) {
        multi.forEach(function(pair) {
          const s = document.createElementNS(ns, 'stop');
          s.setAttribute('offset', pair[0] + '%');
          s.setAttribute('stop-color', 'white');
          s.setAttribute('stop-opacity', pair[1]);
          grad.appendChild(s);
        });
      } else {
        const [a, b, c, d] = pick(i, hFades);
        [[a,0],[b,1],[c,1],[d,0]].forEach(([off, op]) => {
          const s = document.createElementNS(ns, 'stop');
          s.setAttribute('offset', off + '%');
          s.setAttribute('stop-color', 'white');
          s.setAttribute('stop-opacity', op);
          grad.appendChild(s);
        });
      }
      defsEl.appendChild(grad);

      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', 0); line.setAttribute('y1', i * cellH);
      line.setAttribute('x2', gridW); line.setAttribute('y2', i * cellH);
      line.setAttribute('stroke', 'url(#' + gradId + ')');
      line.setAttribute('stroke-width', (hWeights[i] || 0.4) * strokeBoost);
      line.setAttribute('opacity', Math.min((hOpacities[i] || 0.08) * opacityBoost, 1));
      line.classList.add('grid-line', 'grid-line-h');
      line.style.animationDelay = (0.08 * i) + 's';
      gEl.appendChild(line);
    }
  }

  // Desktop grid (normal opacity)
  buildGrid(document.getElementById('gridDefs'), document.getElementById('gridLines'), 'gradD', 1, 1);
  // Mobile grid (subtle — thinner strokes, gentle opacity for visibility)
  buildGrid(document.getElementById('mobileGridDefs'), document.getElementById('mobileGridLines'), 'gradM', 1.5, 0.8);
})();
</script>
