<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Particle Sphere — Micro-interaction</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: pointer;
    user-select: none;
  }

  canvas {
    position: absolute;
    inset: 0;
  }

  #hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    pointer-events: none;
    text-transform: uppercase;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400&display=swap" rel="stylesheet" />
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Hold to expand</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── State ────────────────────────────────────────────
let W = 0, H = 0;
let rotX = 0, rotY = 0;
let mouse = null;
let isDown = false;
let glow   = 0;
let raf;

const BASE_R   = 300;
const INNER_R  = BASE_R / 2.5;
const PERSP    = 800;

// ── Particles ────────────────────────────────────────
let particles = [];

function makeParticle(i, total, radius) {
  const phi = Math.PI * (3 - Math.sqrt(5));
  const y   = 1 - (i / (total - 1)) * 2;
  const r   = Math.sqrt(1 - y * y);
  const th  = phi * i;
  return {
    x: Math.cos(th) * r * radius,
    y: y * radius,
    z: Math.sin(th) * r * radius,
    ox: Math.cos(th) * r,
    oy: y,
    oz: Math.sin(th) * r,
    vx: 0, vy: 0, vz: 0,
    isInner: radius === INNER_R,
    isCore:  false,
  };
}

function initParticles() {
  particles = [];
  const mobile = W < 800;
  const count  = mobile ? 250 : 500;
  const inner  = mobile ? Math.floor(count / 3) : Math.floor(count / 2);

  for (let i = 0; i < count; i++) particles.push(makeParticle(i, count, BASE_R));
  for (let i = 0; i < inner; i++) particles.push(makeParticle(i, inner, INNER_R));
  particles.push({ x:0,y:0,z:0, ox:0,oy:0,oz:0, vx:0,vy:0,vz:0, isInner:false, isCore:true });
}

// ── Orbit dots ───────────────────────────────────────
const orbitDots = Array.from({ length: 6 }, (_, i) => ({
  angle:  (Math.PI * 2 * i) / 6,
  speed:  0.04 + i * 0.012,
  tiltX:  (i * Math.PI) / 3.5,
  tiltZ:  (i * Math.PI) / 5,
  radius: 30 + i * 10,
}));

// ── Resize ───────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initParticles(); });
initParticles();

// ── Input ────────────────────────────────────────────
function setMouse(x, y) {
  const r = canvas.getBoundingClientRect();
  mouse = { x: x - r.left, y: y - r.top };
}

canvas.addEventListener('mousemove',  e => setMouse(e.clientX, e.clientY));
canvas.addEventListener('mousedown',  () => isDown = true);
canvas.addEventListener('mouseleave', () => { mouse = null; isDown = false; });
window.addEventListener('mouseup',    () => isDown = false);

let touchTimer;
canvas.addEventListener('touchstart', e => {
  isDown = true;
  if (e.touches[0]) setMouse(e.touches[0].clientX, e.touches[0].clientY);
  clearTimeout(touchTimer);
  touchTimer = setTimeout(() => { isDown = false; mouse = null; }, 300);
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches[0]) setMouse(e.touches[0].clientX, e.touches[0].clientY);
  clearTimeout(touchTimer);
  touchTimer = setTimeout(() => { isDown = false; mouse = null; }, 300);
}, { passive: true });
canvas.addEventListener('touchend', () => { clearTimeout(touchTimer); isDown = false; mouse = null; }, { passive: true });

// ── Render ───────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  rotY += 0.003;
  rotX += 0.001;

  glow += ((isDown ? 1 : 0) - glow) * 0.08;

  const mobile = W < 800;
  const repulseR = mobile ? 120 : 250;
  const repulseS = mobile ? 3.0 : 6.0;
  const expandM  = mobile ? 1.6 : 1.8;

  const scale = W < 800
    ? W / 650
    : W <= 1500
      ? Math.min(W / 1150, 1)
      : Math.min(W / 1500, 1.4);

  const expansion   = isDown ? expandM : 1.0;
  const outerR      = BASE_R * scale * expansion;
  const cx = W / 2, cy = H / 2;

  // Atmosphere
  if (outerR > 0) {
    const atmo = ctx.createRadialGradient(cx, cy, outerR * 0.2, cx, cy, outerR * 1.5);
    atmo.addColorStop(0, 'rgba(255,255,255,0.08)');
    atmo.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = atmo;
    ctx.beginPath();
    ctx.arc(cx, cy, outerR * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }

  // Physics + projection
  particles.forEach(p => {
    if (p.isCore) return;
    const rad = (p.isInner ? INNER_R : BASE_R) * scale * expansion;

    // Rotate Y
    let tx = p.ox * rad * Math.cos(rotY) - p.oz * rad * Math.sin(rotY);
    let tz = p.ox * rad * Math.sin(rotY) + p.oz * rad * Math.cos(rotY);
    let ty = p.oy * rad;

    // Rotate X
    let ty2 = ty * Math.cos(rotX) - tz * Math.sin(rotX);
    let tz2 = ty * Math.sin(rotX) + tz * Math.cos(rotX);

    p.vx += (tx  - p.x) * 0.05;
    p.vy += (ty2 - p.y) * 0.05;
    p.vz += (tz2 - p.z) * 0.05;

    // Mouse repulsion
    if (mouse) {
      const sc = PERSP / (PERSP + 250 - p.z);
      const sx = p.x * sc + cx;
      const sy = p.y * sc + cy;
      const dx = sx - mouse.x;
      const dy = sy - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < repulseR) {
        const f = (1 - dist / repulseR) * repulseS;
        const a = Math.atan2(dy, dx);
        p.vx += Math.cos(a) * f * 5;
        p.vy += Math.sin(a) * f * 5;
      }
    }

    p.vx *= 0.9; p.vy *= 0.9; p.vz *= 0.9;
    p.x += p.vx; p.y += p.vy; p.z += p.vz;
  });

  // Sort back-to-front
  particles.sort((a, b) => a.z - b.z);

  // Draw particles
  particles.forEach(p => {
    const sc    = PERSP / (PERSP + 250 - p.z);
    const alpha = Math.max(0.1, (sc - 0.5) * 2);
    const px    = p.x * sc + cx;
    const py    = p.y * sc + cy;

    if (p.isCore) {
      ctx.beginPath();
      ctx.arc(px, py, 4 * sc, 0, Math.PI * 2);
      ctx.fillStyle   = 'black';
      ctx.shadowBlur  = 10;
      ctx.shadowColor = 'white';
      ctx.fill();
      ctx.shadowBlur  = 0;
      ctx.shadowColor = 'transparent';
      return;
    }

    const size = (p.isInner ? 1.5 : 2) * sc;
    if (size <= 0) return;
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    if (!mobile) {
      ctx.shadowBlur  = 20;
      ctx.shadowColor = `rgba(255,255,255,${alpha})`;
    }
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Orbiting dots (visible when clicking)
  if (glow > 0.01) {
    orbitDots.forEach(dot => {
      dot.angle += dot.speed;
      const orbitR = dot.radius * scale;

      let dx = Math.cos(dot.angle) * orbitR;
      let dy = 0;
      let dz = Math.sin(dot.angle) * orbitR;

      const cosT = Math.cos(dot.tiltX), sinT = Math.sin(dot.tiltX);
      const dy2  = dy * cosT - dz * sinT;
      const dz2  = dy * sinT + dz * cosT;

      const cosZ = Math.cos(dot.tiltZ), sinZ = Math.sin(dot.tiltZ);
      const dx2  = dx * cosZ - dy2 * sinZ;
      const dy3  = dx * sinZ + dy2 * cosZ;

      const dsc = PERSP / (PERSP + 250 - dz2);
      const dsx = dx2 * dsc + cx;
      const dsy = dy3 * dsc + cy;

      const glowG = ctx.createRadialGradient(dsx, dsy, 0, dsx, dsy, 5 * dsc);
      glowG.addColorStop(0, `rgba(255,255,255,${0.4 * glow})`);
      glowG.addColorStop(1, 'rgba(255,255,255,0)');

      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.arc(dsx, dsy, 5 * dsc, 0, Math.PI * 2);
      ctx.fillStyle = glowG;
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';

      ctx.beginPath();
      ctx.arc(dsx, dsy, 1.2 * dsc, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.8 * glow})`;
      ctx.fill();
    });
  }

  raf = requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
